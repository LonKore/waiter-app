<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waiter Flow</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #3b82f6;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 20px 50px rgba(0,0,0,.35);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,.18), transparent 28%),
        radial-gradient(circle at top left, rgba(34,197,94,.12), transparent 20%),
        linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 300px 1fr 380px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(17,24,39,.78);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-inner { padding: 20px; }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .brand h1 {
      font-size: 28px;
      letter-spacing: -.03em;
      line-height: 1;
    }

    .brand small {
      display: block;
      color: var(--muted);
      margin-top: 6px;
      font-size: 13px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      white-space: nowrap;
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(34,197,94,.12);
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .controls-row,
    .history-toolbar,
    .menu-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select, button, textarea {
      font: inherit;
    }

    .input, .select {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--text);
      outline: none;
    }

    .input::placeholder { color: #7c8aa0; }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      color: white;
      font-weight: 700;
      transition: .18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .btn-secondary { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .btn-ghost {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      color: white;
    }

    .btn.small { padding: 9px 12px; border-radius: 12px; font-size: 13px; }

    .sidebar-block + .sidebar-block { margin-top: 18px; }

    .tables-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .table-card {
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      min-height: 90px;
      cursor: pointer;
      transition: .18s ease;
    }

    .table-card.active {
      background: linear-gradient(135deg, rgba(59,130,246,.30), rgba(34,197,94,.18));
      border-color: rgba(59,130,246,.45);
      box-shadow: inset 0 0 0 1px rgba(59,130,246,.30);
    }

    .table-card:hover { transform: translateY(-2px); }

    .table-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .table-name { font-weight: 800; font-size: 18px; }
    .table-meta { color: var(--muted); font-size: 13px; }
    .table-sum { color: #86efac; font-weight: 800; font-size: 15px; margin-top: 8px; }

    .center-panel-header {
      padding: 20px 20px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .order-badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.25);
      color: #bbf7d0;
      font-weight: 700;
      font-size: 14px;
    }

    .menu-toolbar {
      padding: 20px;
      padding-top: 18px;
      align-items: center;
    }

    .search-grow { flex: 1 1 280px; }

    .categories {
      display: flex;
      gap: 10px;
      padding: 0 20px 18px;
      flex-wrap: wrap;
    }

    .category-pill {
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
    }

    .category-pill.active {
      color: white;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-color: transparent;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
      padding: 0 20px 20px;
      max-height: calc(100vh - 220px);
      overflow: auto;
    }

    .product-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 150px;
    }

    .product-category {
      font-size: 12px;
      color: #cbd5e1;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      width: fit-content;
      padding: 6px 10px;
    }

    .product-name {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      flex: 1;
    }

    .product-price {
      color: #fcd34d;
      font-size: 18px;
      font-weight: 800;
    }

    .right-sticky {
      position: sticky;
      top: 20px;
    }

    .order-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 380px;
      overflow: auto;
      margin-top: 16px;
    }

    .order-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
    }

    .order-item-name { font-weight: 700; }
    .order-item-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-weight: 800;
      color: white;
      background: rgba(255,255,255,.12);
    }

    .qty-value {
      min-width: 24px;
      text-align: center;
      font-weight: 800;
    }

    .summary-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(34,197,94,.15), rgba(59,130,246,.15));
      border: 1px solid rgba(255,255,255,.10);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
    }

    .summary-row.total {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.10);
      color: white;
      font-size: 22px;
      font-weight: 900;
    }

    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,.12);
      border-radius: 18px;
      background: rgba(255,255,255,.03);
    }

    .history-wrap { margin-top: 18px; }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 360px;
      overflow: auto;
      margin-top: 16px;
    }

    .history-card {
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
    }

    .history-card-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 10px;
    }

    .history-card-title {
      font-weight: 800;
      font-size: 16px;
    }

    .history-card-time {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .history-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: #dbeafe;
      font-size: 14px;
    }

    .history-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .history-footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .total-pill {
      color: #fde68a;
      font-weight: 800;
      font-size: 17px;
    }

    .muted { color: var(--muted); }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(3,7,18,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .dialog-backdrop.open { display: flex; }

    .dialog {
      width: 100%;
      max-width: 520px;
      background: #111827;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .dialog-header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dialog-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dialog-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 0 20px 20px;
      flex-wrap: wrap;
    }

    .mini-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      margin-top: 6px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
    }

    .toast-wrap {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 80;
    }

    .toast {
      background: #111827;
      border: 1px solid rgba(255,255,255,.12);
      color: white;
      padding: 12px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      min-width: 240px;
    }

    .toast.success { border-color: rgba(34,197,94,.35); }
    .toast.error { border-color: rgba(239,68,68,.35); }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 280px 1fr; }
      .right-column { grid-column: 1 / -1; }
      .right-sticky { position: static; }
    }

    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .products-grid { max-height: none; }
      .center-panel-header { flex-direction: column; }
      .tables-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 560px) {
      body { padding: 12px; }
      .panel-inner, .menu-toolbar, .center-panel-header, .categories, .products-grid { padding-left: 14px; padding-right: 14px; }
      .tables-grid { grid-template-columns: repeat(2, 1fr); }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .brand h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="panel-inner">
        <div class="brand">
          <div>
            <h1>Waiter Flow</h1>
            <small>Столы, заказы, история</small>
          </div>
          <div class="chip"><span class="chip-dot"></span>Локально</div>
        </div>

        <div class="sidebar-block">
          <div class="section-title">Столы</div>
          <div class="controls-row" style="margin-bottom:12px;">
            <input id="newTableInput" class="input" placeholder="Новый стол: VIP, 12, Бар" />
            <button id="addTableBtn" class="btn btn-secondary small">Добавить</button>
          </div>
          <div id="tablesGrid" class="tables-grid"></div>
        </div>

        <div class="sidebar-block history-wrap">
          <div class="section-title">История</div>
          <div class="history-toolbar">
            <input id="historySearch" class="input" placeholder="Поиск по истории" />
            <button class="btn btn-ghost small" id="clearHistoryBtn">Очистить всё</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </div>
    </aside>

    <main class="panel">
      <div class="center-panel-header">
        <div>
          <div class="section-title">Меню</div>
          <h2 style="font-size:28px; line-height:1.05;">Быстрый выбор товаров</h2>
          <p class="muted" style="margin-top:8px;">Выбери стол, нажимай на позиции и сразу собирай заказ.</p>
        </div>
        <div id="activeTableBadge" class="order-badge">Стол не выбран</div>
      </div>

      <div class="menu-toolbar">
        <input id="productSearch" class="input search-grow" placeholder="Поиск товара" />
        <button id="openProductDialogBtn" class="btn btn-primary">+ Добавить товар</button>
      </div>

      <div id="categories" class="categories"></div>
      <div id="productsGrid" class="products-grid"></div>
    </main>

    <section class="panel right-column">
      <div class="panel-inner right-sticky">
        <div class="section-title">Текущий заказ</div>
        <div id="orderState"></div>
      </div>
    </section>
  </div>

  <div id="productDialogBackdrop" class="dialog-backdrop">
    <div class="dialog">
      <div class="dialog-header">
        <strong>Новый товар</strong>
        <button class="btn btn-ghost small" data-close-dialog="product">✕</button>
      </div>
      <div class="dialog-body">
        <input id="productNameInput" class="input" placeholder="Название товара" />
        <input id="productPriceInput" class="input" type="number" min="0" step="1" placeholder="Цена" />
        <input id="productCategoryInput" class="input" placeholder="Категория: Пиво, Еда, Напитки" />
      </div>
      <div class="dialog-actions">
        <button class="btn btn-ghost" data-close-dialog="product">Отмена</button>
        <button id="saveProductBtn" class="btn btn-primary">Сохранить</button>
      </div>
    </div>
  </div>

  <div id="manageTablesBackdrop" class="dialog-backdrop">
    <div class="dialog">
      <div class="dialog-header">
        <strong>Управление столами</strong>
        <button class="btn btn-ghost small" data-close-dialog="tables">✕</button>
      </div>
      <div class="dialog-body">
        <div class="controls-row">
          <input id="dialogTableInput" class="input" placeholder="Название стола" />
          <button id="dialogAddTableBtn" class="btn btn-secondary">Добавить</button>
        </div>
        <div id="manageTablesList" class="mini-list"></div>
      </div>
      <div class="dialog-actions">
        <button class="btn btn-ghost" data-close-dialog="tables">Закрыть</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script>
    const STORAGE_KEYS = {
      tables: 'waiter_flow_tables_v1',
      products: 'waiter_flow_products_v1',
      orders: 'waiter_flow_orders_v1',
      history: 'waiter_flow_history_v1',
      selectedTableId: 'waiter_flow_selected_table_v1'
    };

    const defaultTables = [
      { id: uid(), name: '1' },
      { id: uid(), name: '2' },
      { id: uid(), name: '3' },
      { id: uid(), name: '4' },
      { id: uid(), name: 'VIP' },
      { id: uid(), name: 'Бар' }
    ];

    const defaultProducts = [
      { id: uid(), name: 'Лагер', price: 250, category: 'Пиво' },
      { id: uid(), name: 'IPA', price: 320, category: 'Пиво' },
      { id: uid(), name: 'Стаут', price: 340, category: 'Пиво' },
      { id: uid(), name: 'Картофель фри', price: 220, category: 'Еда' },
      { id: uid(), name: 'Крылышки', price: 390, category: 'Еда' },
      { id: uid(), name: 'Гренки', price: 180, category: 'Еда' },
      { id: uid(), name: 'Кола', price: 140, category: 'Напитки' },
      { id: uid(), name: 'Морс', price: 160, category: 'Напитки' },
      { id: uid(), name: 'Кофе', price: 170, category: 'Напитки' }
    ];

    let state = {
      tables: load(STORAGE_KEYS.tables, defaultTables),
      products: load(STORAGE_KEYS.products, defaultProducts),
      orders: load(STORAGE_KEYS.orders, {}),
      history: load(STORAGE_KEYS.history, []),
      selectedTableId: load(STORAGE_KEYS.selectedTableId, null),
      productSearch: '',
      historySearch: '',
      selectedCategory: 'Все'
    };

    const els = {
      tablesGrid: document.getElementById('tablesGrid'),
      productsGrid: document.getElementById('productsGrid'),
      categories: document.getElementById('categories'),
      orderState: document.getElementById('orderState'),
      activeTableBadge: document.getElementById('activeTableBadge'),
      newTableInput: document.getElementById('newTableInput'),
      addTableBtn: document.getElementById('addTableBtn'),
      productSearch: document.getElementById('productSearch'),
      historySearch: document.getElementById('historySearch'),
      historyList: document.getElementById('historyList'),
      clearHistoryBtn: document.getElementById('clearHistoryBtn'),
      productDialogBackdrop: document.getElementById('productDialogBackdrop'),
      openProductDialogBtn: document.getElementById('openProductDialogBtn'),
      productNameInput: document.getElementById('productNameInput'),
      productPriceInput: document.getElementById('productPriceInput'),
      productCategoryInput: document.getElementById('productCategoryInput'),
      saveProductBtn: document.getElementById('saveProductBtn'),
      manageTablesBackdrop: document.getElementById('manageTablesBackdrop'),
      manageTablesList: document.getElementById('manageTablesList'),
      dialogTableInput: document.getElementById('dialogTableInput'),
      dialogAddTableBtn: document.getElementById('dialogAddTableBtn'),
      toastWrap: document.getElementById('toastWrap')
    };

    ensureSelectedTable();
    renderAll();
    bindEvents();

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function load(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEYS.tables, JSON.stringify(state.tables));
      localStorage.setItem(STORAGE_KEYS.products, JSON.stringify(state.products));
      localStorage.setItem(STORAGE_KEYS.orders, JSON.stringify(state.orders));
      localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(state.history));
      localStorage.setItem(STORAGE_KEYS.selectedTableId, JSON.stringify(state.selectedTableId));
    }

    function ensureSelectedTable() {
      const exists = state.tables.some(t => t.id === state.selectedTableId);
      if (!exists) {
        state.selectedTableId = state.tables[0]?.id || null;
      }
    }

    function bindEvents() {
      els.addTableBtn.addEventListener('click', () => addTable(els.newTableInput.value));
      els.newTableInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') addTable(els.newTableInput.value);
      });

      els.dialogAddTableBtn.addEventListener('click', () => addTable(els.dialogTableInput.value, true));
      els.dialogTableInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') addTable(els.dialogTableInput.value, true);
      });

      els.productSearch.addEventListener('input', e => {
        state.productSearch = e.target.value.trim().toLowerCase();
        renderProducts();
      });

      els.historySearch.addEventListener('input', e => {
        state.historySearch = e.target.value.trim().toLowerCase();
        renderHistory();
      });

      els.clearHistoryBtn.addEventListener('click', () => {
        if (!state.history.length) return toast('История уже пустая');
        if (!confirm('Удалить всю историю заказов?')) return;
        state.history = [];
        save();
        renderHistory();
        toast('История очищена', 'success');
      });

      els.openProductDialogBtn.addEventListener('click', () => openDialog('product'));
      els.saveProductBtn.addEventListener('click', saveProduct);

      document.querySelectorAll('[data-close-dialog]').forEach(btn => {
        btn.addEventListener('click', () => closeDialog(btn.dataset.closeDialog));
      });

      els.productDialogBackdrop.addEventListener('click', e => {
        if (e.target === els.productDialogBackdrop) closeDialog('product');
      });

      els.manageTablesBackdrop.addEventListener('click', e => {
        if (e.target === els.manageTablesBackdrop) closeDialog('tables');
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          closeDialog('product');
          closeDialog('tables');
        }
      });
    }

    function renderAll() {
      renderTables();
      renderCategories();
      renderProducts();
      renderOrder();
      renderHistory();
      renderManageTables();
    }

    function renderTables() {
      ensureSelectedTable();
      els.tablesGrid.innerHTML = '';

      state.tables.forEach(table => {
        const order = state.orders[table.id] || [];
        const total = getOrderTotal(order);
        const itemCount = order.reduce((sum, item) => sum + item.qty, 0);

        const card = document.createElement('button');
        card.className = 'table-card' + (state.selectedTableId === table.id ? ' active' : '');
        card.innerHTML = `
          <div class="table-top">
            <div>
              <div class="table-name">${escapeHtml(table.name)}</div>
              <div class="table-meta">${itemCount ? `${itemCount} поз.` : 'Нет заказа'}</div>
            </div>
            <div class="chip" style="padding:6px 10px; font-size:12px;">${itemCount ? 'Активен' : 'Свободен'}</div>
          </div>
          <div class="table-sum">${money(total)}</div>
        `;
        card.addEventListener('click', () => {
          state.selectedTableId = table.id;
          save();
          renderTables();
          renderOrder();
        });
        els.tablesGrid.appendChild(card);
      });
    }

    function renderCategories() {
      const categories = ['Все', ...new Set(state.products.map(p => (p.category || 'Без категории').trim()))];
      els.categories.innerHTML = '';

      categories.forEach(category => {
        const btn = document.createElement('button');
        btn.className = 'category-pill' + (state.selectedCategory === category ? ' active' : '');
        btn.textContent = category;
        btn.addEventListener('click', () => {
          state.selectedCategory = category;
          renderCategories();
          renderProducts();
        });
        els.categories.appendChild(btn);
      });
    }

    function renderProducts() {
      const filtered = state.products.filter(product => {
        const matchesSearch = !state.productSearch || product.name.toLowerCase().includes(state.productSearch);
        const matchesCategory = state.selectedCategory === 'Все' || (product.category || 'Без категории') === state.selectedCategory;
        return matchesSearch && matchesCategory;
      });

      els.productsGrid.innerHTML = '';

      if (!filtered.length) {
        els.productsGrid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">Ничего не найдено</div>';
        return;
      }

      filtered.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-category">${escapeHtml(product.category || 'Без категории')}</div>
          <div class="product-name">${escapeHtml(product.name)}</div>
          <div class="product-price">${money(product.price)}</div>
          <div class="controls-row">
            <button class="btn btn-primary small" style="width:100%;">Добавить в заказ</button>
          </div>
        `;
        card.querySelector('button').addEventListener('click', () => addProductToOrder(product.id));
        els.productsGrid.appendChild(card);
      });
    }

    function renderOrder() {
      const selectedTable = state.tables.find(t => t.id === state.selectedTableId);
      els.activeTableBadge.textContent = selectedTable ? `Стол ${selectedTable.name}` : 'Стол не выбран';

      if (!selectedTable) {
        els.orderState.innerHTML = '<div class="empty-state">Добавь хотя бы один стол</div>';
        return;
      }

      const order = state.orders[selectedTable.id] || [];

      if (!order.length) {
        els.orderState.innerHTML = `
          <div class="empty-state">
            <div style="font-size:18px; font-weight:800; color:white; margin-bottom:8px;">У стола ${escapeHtml(selectedTable.name)} пока пусто</div>
            <div>Выбери товары в центре экрана, чтобы собрать заказ.</div>
            <div class="controls-row" style="margin-top:14px; justify-content:center;">
              <button class="btn btn-ghost" id="manageTablesOpenBtn">Управление столами</button>
            </div>
          </div>
        `;
        document.getElementById('manageTablesOpenBtn')?.addEventListener('click', () => openDialog('tables'));
        return;
      }

      const totalQty = order.reduce((sum, item) => sum + item.qty, 0);
      const total = getOrderTotal(order);

      const orderHtml = order.map(item => {
        const product = state.products.find(p => p.id === item.productId);
        if (!product) return '';
        return `
          <div class="order-item">
            <div>
              <div class="order-item-name">${escapeHtml(product.name)}</div>
              <div class="order-item-sub">${money(product.price)} × ${item.qty} = ${money(product.price * item.qty)}</div>
            </div>
            <div class="qty-controls">
              <button class="qty-btn" data-dec="${item.productId}">−</button>
              <div class="qty-value">${item.qty}</div>
              <button class="qty-btn" data-inc="${item.productId}">+</button>
            </div>
          </div>
        `;
      }).join('');

      els.orderState.innerHTML = `
        <div class="controls-row" style="margin-bottom:12px;">
          <button class="btn btn-ghost small" id="manageTablesOpenBtn">Столы</button>
          <button class="btn btn-danger small" id="clearOrderBtn">Очистить</button>
        </div>
        <div class="order-list">${orderHtml}</div>
        <div class="summary-box">
          <div class="summary-row"><span>Позиций</span><strong>${totalQty}</strong></div>
          <div class="summary-row"><span>Уникальных товаров</span><strong>${order.length}</strong></div>
          <div class="summary-row total"><span>Итого</span><span>${money(total)}</span></div>
        </div>
        <div class="controls-row" style="margin-top:14px;">
          <button class="btn btn-primary" id="completeOrderBtn" style="flex:1;">Закрыть заказ</button>
        </div>
      `;

      els.orderState.querySelectorAll('[data-inc]').forEach(btn => {
        btn.addEventListener('click', () => changeQty(btn.dataset.inc, 1));
      });
      els.orderState.querySelectorAll('[data-dec]').forEach(btn => {
        btn.addEventListener('click', () => changeQty(btn.dataset.dec, -1));
      });
      document.getElementById('clearOrderBtn')?.addEventListener('click', clearCurrentOrder);
      document.getElementById('completeOrderBtn')?.addEventListener('click', completeOrder);
      document.getElementById('manageTablesOpenBtn')?.addEventListener('click', () => openDialog('tables'));
    }

    function renderHistory() {
      const query = state.historySearch;
      const filtered = state.history.filter(entry => {
        const hay = [
          entry.tableName,
          ...entry.items.map(i => i.name)
        ].join(' ').toLowerCase();
        return !query || hay.includes(query);
      });

      els.historyList.innerHTML = '';

      if (!filtered.length) {
        els.historyList.innerHTML = '<div class="empty-state">История пока пустая</div>';
        return;
      }

      filtered.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'history-card';
        card.innerHTML = `
          <div class="history-card-header">
            <div>
              <div class="history-card-title">Стол ${escapeHtml(entry.tableName)}</div>
              <div class="muted">${entry.items.length} товаров</div>
            </div>
            <div class="history-card-time">${formatDate(entry.createdAt)}</div>
          </div>
          <div class="history-items">
            ${entry.items.map(item => `<div class="history-line"><span>${escapeHtml(item.name)} × ${item.qty}</span><strong>${money(item.price * item.qty)}</strong></div>`).join('')}
          </div>
          <div class="history-footer">
            <div class="total-pill">${money(entry.total)}</div>
            <div class="controls-row">
              <button class="btn btn-ghost small" data-repeat="${entry.id}">Повторить</button>
              <button class="btn btn-danger small" data-delete-history="${entry.id}">Удалить</button>
            </div>
          </div>
        `;
        card.querySelector('[data-repeat]')?.addEventListener('click', () => repeatOrder(entry.id));
        card.querySelector('[data-delete-history]')?.addEventListener('click', () => deleteHistoryEntry(entry.id));
        els.historyList.appendChild(card);
      });
    }

    function renderManageTables() {
      els.manageTablesList.innerHTML = '';
      state.tables.forEach(table => {
        const row = document.createElement('div');
        row.className = 'mini-row';
        row.innerHTML = `
          <input class="input" value="${escapeAttr(table.name)}" data-table-name="${table.id}" />
          <button class="btn btn-ghost small" data-save-table="${table.id}">Сохранить</button>
          <button class="btn btn-danger small" data-remove-table="${table.id}">✕</button>
        `;
        row.querySelector('[data-save-table]')?.addEventListener('click', () => {
          const input = row.querySelector('[data-table-name]');
          renameTable(table.id, input.value);
        });
        row.querySelector('[data-remove-table]')?.addEventListener('click', () => removeTable(table.id));
        els.manageTablesList.appendChild(row);
      });
    }

    function addTable(rawName, fromDialog = false) {
      const name = String(rawName || '').trim();
      if (!name) return toast('Введи название стола', 'error');
      state.tables.push({ id: uid(), name });
      if (!state.selectedTableId) state.selectedTableId = state.tables[state.tables.length - 1].id;
      save();
      renderTables();
      renderOrder();
      renderManageTables();
      if (fromDialog) els.dialogTableInput.value = '';
      else els.newTableInput.value = '';
      toast(`Стол «${name}» добавлен`, 'success');
    }

    function renameTable(tableId, rawName) {
      const name = String(rawName || '').trim();
      if (!name) return toast('Название не может быть пустым', 'error');
      const table = state.tables.find(t => t.id === tableId);
      if (!table) return;
      table.name = name;
      save();
      renderTables();
      renderOrder();
      renderHistory();
      renderManageTables();
      toast('Название стола обновлено', 'success');
    }

    function removeTable(tableId) {
      const table = state.tables.find(t => t.id === tableId);
      if (!table) return;
      if (!confirm(`Удалить стол «${table.name}»?`)) return;

      delete state.orders[tableId];
      state.tables = state.tables.filter(t => t.id !== tableId);
      ensureSelectedTable();
      save();
      renderAll();
      toast('Стол удалён', 'success');
    }

    function saveProduct() {
      const name = els.productNameInput.value.trim();
      const price = Number(els.productPriceInput.value);
      const category = els.productCategoryInput.value.trim() || 'Без категории';

      if (!name) return toast('Введи название товара', 'error');
      if (!Number.isFinite(price) || price < 0) return toast('Укажи корректную цену', 'error');

      state.products.unshift({ id: uid(), name, price, category });
      save();
      renderCategories();
      renderProducts();
      closeDialog('product');
      els.productNameInput.value = '';
      els.productPriceInput.value = '';
      els.productCategoryInput.value = '';
      toast(`Товар «${name}» добавлен`, 'success');
    }

    function addProductToOrder(productId) {
      const tableId = state.selectedTableId;
      if (!tableId) return toast('Сначала создай или выбери стол', 'error');

      const product = state.products.find(p => p.id === productId);
      if (!product) return;

      const order = state.orders[tableId] || [];
      const existing = order.find(item => item.productId === productId);

      if (existing) existing.qty += 1;
      else order.push({ productId, qty: 1 });

      state.orders[tableId] = order;
      save();
      renderTables();
      renderOrder();
      toast(`Добавлено: ${product.name}`, 'success');
    }

    function changeQty(productId, diff) {
      const tableId = state.selectedTableId;
      const order = state.orders[tableId] || [];
      const item = order.find(i => i.productId === productId);
      if (!item) return;
      item.qty += diff;
      if (item.qty <= 0) {
        state.orders[tableId] = order.filter(i => i.productId !== productId);
      }
      save();
      renderTables();
      renderOrder();
    }

    function clearCurrentOrder() {
      const tableId = state.selectedTableId;
      if (!tableId || !(state.orders[tableId] || []).length) return;
      if (!confirm('Очистить текущий заказ?')) return;
      state.orders[tableId] = [];
      save();
      renderTables();
      renderOrder();
      toast('Заказ очищен');
    }

    function completeOrder() {
      const table = state.tables.find(t => t.id === state.selectedTableId);
      const order = state.orders[state.selectedTableId] || [];
      if (!table || !order.length) return toast('Заказ пустой', 'error');

      const items = order.map(item => {
        const product = state.products.find(p => p.id === item.productId);
        return {
          productId: item.productId,
          name: product?.name || 'Неизвестный товар',
          qty: item.qty,
          price: product?.price || 0
        };
      });

      const entry = {
        id: uid(),
        tableId: table.id,
        tableName: table.name,
        createdAt: new Date().toISOString(),
        items,
        total: items.reduce((sum, item) => sum + item.price * item.qty, 0)
      };

      state.history.unshift(entry);
      state.orders[table.id] = [];
      save();
      renderTables();
      renderOrder();
      renderHistory();
      toast(`Заказ по столу ${table.name} закрыт`, 'success');
    }

    function deleteHistoryEntry(entryId) {
      if (!confirm('Удалить запись из истории?')) return;
      state.history = state.history.filter(item => item.id !== entryId);
      save();
      renderHistory();
      toast('Запись удалена');
    }

    function repeatOrder(entryId) {
      const entry = state.history.find(item => item.id === entryId);
      const tableId = state.selectedTableId;
      if (!entry) return;
      if (!tableId) return toast('Нет выбранного стола', 'error');

      state.orders[tableId] = entry.items.map(item => ({
        productId: item.productId,
        qty: item.qty
      }));
      save();
      renderTables();
      renderOrder();
      toast('Заказ перенесён в текущий стол', 'success');
    }

    function getOrderTotal(order) {
      return order.reduce((sum, item) => {
        const product = state.products.find(p => p.id === item.productId);
        return sum + (product?.price || 0) * item.qty;
      }, 0);
    }

    function money(value) {
      return `${Number(value || 0).toLocaleString('ru-RU')} ₽`;
    }

    function formatDate(iso) {
      const date = new Date(iso);
      return new Intl.DateTimeFormat('ru-RU', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    }

    function openDialog(name) {
      if (name === 'product') els.productDialogBackdrop.classList.add('open');
      if (name === 'tables') {
        renderManageTables();
        els.manageTablesBackdrop.classList.add('open');
      }
    }

    function closeDialog(name) {
      if (name === 'product') els.productDialogBackdrop.classList.remove('open');
      if (name === 'tables') els.manageTablesBackdrop.classList.remove('open');
    }

    function toast(message, type = '') {
      const node = document.createElement('div');
      node.className = `toast ${type}`.trim();
      node.textContent = message;
      els.toastWrap.appendChild(node);
      setTimeout(() => node.remove(), 2600);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
