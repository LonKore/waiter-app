<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WAITER PRO • Умный официант</title>
    <!-- Подключаем Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px;
            padding: 24px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding: 0 8px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
        }

        .section {
            display: none;
            animation: fadeIn 0.3s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .table-btn {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            box-shadow: 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px;
            word-break: break-word;
        }

        .table-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
        }

        .table-btn:active {
            transform: scale(0.95);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .product-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 18px 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .product-btn:active {
            background: rgba(59, 130, 246, 0.3);
            transform: scale(0.97);
        }

        .product-name {
            font-size: 14px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .order-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .order-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .table-indicator {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .order-items {
            min-height: 60px;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-row:last-child {
            border-bottom: none;
        }

        .item-name {
            color: white;
            font-weight: 500;
            flex: 2;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 40px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .qty-btn:active {
            background: #3b82f6;
            transform: scale(0.9);
        }

        .item-qty {
            color: white;
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        .empty-cart {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 30px 0;
            font-style: italic;
        }

        .total-sum {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 40px;
            padding: 16px 24px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .primary-btn, .clear-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .primary-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 10px 20px -10px #10b981;
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .primary-btn:active, .clear-btn:active {
            transform: scale(0.97);
        }

        .history-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-table {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-time {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .history-items {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .history-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .history-item-name {
            color: rgba(255, 255, 255, 0.8);
        }

        .history-item-qty {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #fbbf24;
        }

        .history-total {
            text-align: right;
            color: #fbbf24;
            font-weight: 700;
            font-size: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            margin-top: 8px;
        }

        .history-empty {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }

        .loading {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 40px 0;
        }

        .footer-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>WAITER PRO</h1>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabCurrent">📋 Заказ</button>
            <button class="tab" id="tabHistory">📜 История</button>
        </div>

        <div class="section active" id="currentSection">
            <div class="tables-section">
                <div class="section-label">СТОЛЫ</div>
                <div class="tables-grid" id="tablesContainer"></div>
            </div>

            <div class="menu-section">
                <div class="section-label">МЕНЮ</div>
                <div class="menu-grid" id="productsContainer"></div>
            </div>

            <div class="order-section">
                <div class="order-header">
                    <h3>Текущий заказ</h3>
                    <span class="table-indicator" id="currentTableLabel">Стол не выбран</span>
                </div>
                <div class="order-items" id="orderItemsContainer">
                    <div class="empty-cart">Выберите товар</div>
                </div>
            </div>

            <div class="total-sum" id="totalSum">0 ₽</div>

            <div class="action-buttons">
                <button class="primary-btn" id="confirmOrderBtn">✅ Подтвердить</button>
                <button class="clear-btn" id="clearOrderBtn">🗑️ Очистить</button>
            </div>
        </div>

        <div class="section" id="historySection">
            <div class="section-label">ИСТОРИЯ ЗАКАЗОВ</div>
            <div class="history-list" id="historyContainer">
                <div class="loading">Загрузка...</div>
            </div>
        </div>

        <div class="footer-note">Нажмите на товар • +/- в заказе</div>
    </div>

    <script>
        (function() {
            // ============================================
            // НАСТРОЙКИ SUPABASE
            // ============================================
            const SUPABASE_URL = 'https://sbogpobfdlpxjdtbbmln.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_Jd2iPn2HX3IDw-sqxhXhwA_mc1W2pHY';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // ============================================
            // ПОСТОЯННЫЕ ДАННЫЕ (НЕ МЕНЯЮТСЯ)
            // ============================================
            const TABLES = [
                { id: 1, name: '1' },
                { id: 2, name: '2' },
                { id: 3, name: '3' },
                { id: 4, name: '4' },
                { id: 5, name: '5' },
                { id: 6, name: '6' },
                { id: 7, name: '7' },
                { id: 8, name: '8' },
                { id: 9, name: 'VIP' },
                { id: 10, name: 'Терраса' },
                { id: 11, name: 'Бар' },
                { id: 12, name: 'ДР' }
            ];

            const PRODUCTS = [
                { id: 1, name: 'Мед черника', price: 350 },
                { id: 2, name: 'Кран банан', price: 320 },
                { id: 3, name: 'Майкл дж', price: 380 },
                { id: 4, name: 'Стаут', price: 400 },
                { id: 5, name: 'Натти нат', price: 290 },
                { id: 6, name: 'Брускетта', price: 450 },
                { id: 7, name: 'пивчики', price: 280 },
                { id: 8, name: 'Чипсы', price: 220 },
                { id: 9, name: 'Чичарон', price: 320 },
                { id: 10, name: 'Карпачо', price: 580 },
                { id: 11, name: 'Картофель фри', price: 250 },
                { id: 12, name: 'Фисташка', price: 400 },
                { id: 13, name: 'Арахис', price: 200 },
                { id: 14, name: 'Сендвич', price: 380 },
                { id: 15, name: 'Гренки', price: 180 },
                { id: 16, name: 'Лагер', price: 300 },
                { id: 17, name: 'Хелес', price: 320 }
            ];

            // Состояние приложения
            let orders = {}; // текущие заказы по id стола
            let orderHistory = []; // история заказов из БД
            let currentTableId = null;

            // DOM элементы
            const tablesContainer = document.getElementById('tablesContainer');
            const productsContainer = document.getElementById('productsContainer');
            const orderItemsContainer = document.getElementById('orderItemsContainer');
            const currentTableLabel = document.getElementById('currentTableLabel');
            const clearBtn = document.getElementById('clearOrderBtn');
            const confirmBtn = document.getElementById('confirmOrderBtn');
            const totalSumElement = document.getElementById('totalSum');
            const historyContainer = document.getElementById('historyContainer');
            const tabCurrent = document.getElementById('tabCurrent');
            const tabHistory = document.getElementById('tabHistory');
            const currentSection = document.getElementById('currentSection');
            const historySection = document.getElementById('historySection');

            // ============================================
            // ЗАГРУЗКА ИСТОРИИ ИЗ SUPABASE
            // ============================================
            async function loadHistoryFromDB() {
                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) {
                        console.error('Ошибка загрузки истории:', error);
                        return [];
                    }

                    return data.map(item => ({
                        id: item.id,
                        tableId: item.table_id,
                        tableName: TABLES.find(t => t.id === item.table_id)?.name || `Стол ${item.table_id}`,
                        time: new Date(item.created_at).toLocaleString('ru-RU', {
                            hour: '2-digit',
                            minute: '2-digit',
                            day: '2-digit',
                            month: '2-digit'
                        }),
                        items: item.items,
                        total: item.total
                    }));
                } catch (e) {
                    console.error('Ошибка:', e);
                    return [];
                }
            }

            // ============================================
            // СОХРАНЕНИЕ ЗАКАЗА В SUPABASE
            // ============================================
            async function saveOrderToDB(tableId, items, total) {
                try {
                    const { error } = await supabase
                        .from('orders')
                        .insert([{ 
                            table_id: tableId, 
                            items: items, 
                            total: total 
                        }]);

                    if (error) {
                        console.error('Ошибка сохранения:', error);
                        alert('Ошибка сохранения заказа');
                        return false;
                    }
                    return true;
                } catch (e) {
                    console.error('Ошибка:', e);
                    return false;
                }
            }

            // ============================================
            // РЕНДЕР СТОЛОВ
            // ============================================
            function renderTables() {
                let html = '';
                TABLES.forEach(table => {
                    const activeClass = (currentTableId === table.id) ? 'active' : '';
                    html += `<button class="table-btn ${activeClass}" data-table-id="${table.id}">${table.name}</button>`;
                });
                tablesContainer.innerHTML = html;

                document.querySelectorAll('.table-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const tableId = parseInt(e.currentTarget.dataset.tableId);
                        currentTableId = tableId;
                        renderTables();
                        renderOrder();
                    });
                });
            }

            // ============================================
            // РЕНДЕР ТОВАРОВ
            // ============================================
            function renderProducts() {
                let html = '';
                PRODUCTS.forEach(p => {
                    html += `
                        <button class="product-btn" data-product-id="${p.id}">
                            <span class="product-name">${p.name}</span>
                            <span class="product-price">${p.price}₽</span>
                        </button>
                    `;
                });
                productsContainer.innerHTML = html;

                document.querySelectorAll('.product-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const productId = parseInt(e.currentTarget.dataset.productId);
                        handleAddProduct(productId);
                    });
                });
            }

            // ============================================
            // РАБОТА С ЗАКАЗОМ
            // ============================================
            function handleAddProduct(productId) {
                if (!currentTableId) {
                    alert('Выберите стол');
                    return;
                }

                if (!orders[currentTableId]) {
                    orders[currentTableId] = {};
                }

                orders[currentTableId][productId] = (orders[currentTableId][productId] || 0) + 1;
                renderOrder();
            }

            function handleIncrease(productId) {
                if (!currentTableId) return;
                orders[currentTableId][productId] = (orders[currentTableId][productId] || 0) + 1;
                renderOrder();
            }

            function handleDecrease(productId) {
                if (!currentTableId) return;
                
                if (orders[currentTableId][productId] > 1) {
                    orders[currentTableId][productId] -= 1;
                } else {
                    delete orders[currentTableId][productId];
                }
                
                renderOrder();
            }

            function renderOrder() {
                const currentTable = TABLES.find(t => t.id === currentTableId);
                currentTableLabel.textContent = currentTable ? currentTable.name : 'Стол не выбран';

                const order = (currentTableId && orders[currentTableId]) ? orders[currentTableId] : {};
                
                if (!currentTableId || Object.keys(order).length === 0) {
                    orderItemsContainer.innerHTML = '<div class="empty-cart">Выберите товар</div>';
                    totalSumElement.textContent = '0 ₽';
                    return;
                }

                let html = '';
                let total = 0;
                
                for (let productId in order) {
                    const count = order[productId];
                    const product = PRODUCTS.find(p => p.id === parseInt(productId));
                    if (!product) continue;
                    
                    total += product.price * count;
                    
                    html += `
                        <div class="order-row">
                            <span class="item-name">${product.name}</span>
                            <div class="item-controls">
                                <button class="qty-btn minus" data-product-id="${product.id}">−</button>
                                <span class="item-qty">${count}</span>
                                <button class="qty-btn plus" data-product-id="${product.id}">+</button>
                            </div>
                        </div>
                    `;
                }

                orderItemsContainer.innerHTML = html;
                totalSumElement.textContent = `${total} ₽`;

                document.querySelectorAll('.qty-btn.plus').forEach(btn => {
                    btn.addEventListener('click', () => handleIncrease(parseInt(btn.dataset.productId)));
                });

                document.querySelectorAll('.qty-btn.minus').forEach(btn => {
                    btn.addEventListener('click', () => handleDecrease(parseInt(btn.dataset.productId)));
                });
            }

            // ============================================
            // РЕНДЕР ИСТОРИИ
            // ============================================
            function renderHistory() {
                if (orderHistory.length === 0) {
                    historyContainer.innerHTML = '<div class="history-empty">История пуста</div>';
                    return;
                }

                let html = '';
                
                orderHistory.forEach(order => {
                    let itemsList = [];
                    let orderTotal = 0;
                    
                    for (let productId in order.items) {
                        const count = order.items[productId];
                        const product = PRODUCTS.find(p => p.id === parseInt(productId));
                        if (product) {
                            itemsList.push(`${product.name} x${count}`);
                            orderTotal += product.price * count;
                        }
                    }
                    
                    html += `
                        <div class="history-item">
                            <div class="history-header">
                                <span class="history-table">${order.tableName}</span>
                                <span class="history-time">${order.time}</span>
                            </div>
                            <div class="history-items">
                                ${itemsList.map(text => {
                                    const [name, qty] = text.split(' x');
                                    return `<div class="history-item-row">
                                        <span class="history-item-name">${name}</span>
                                        <span class="history-item-qty">×${qty}</span>
                                    </div>`;
                                }).join('')}
                            </div>
                            <div class="history-total">${order.total} ₽</div>
                        </div>
                    `;
                });

                historyContainer.innerHTML = html;
            }

            // ============================================
            // ПОДТВЕРЖДЕНИЕ ЗАКАЗА
            // ============================================
            confirmBtn.addEventListener('click', async () => {
                if (!currentTableId) {
                    alert('Выберите стол');
                    return;
                }

                const order = orders[currentTableId];
                if (!order || Object.keys(order).length === 0) {
                    alert('Заказ пуст');
                    return;
                }

                const total = parseInt(totalSumElement.textContent.replace('₽', '').trim()) || 0;

                const saved = await saveOrderToDB(currentTableId, order, total);
                
                if (saved) {
                    delete orders[currentTableId];
                    renderOrder();
                    
                    // Обновляем историю
                    const newHistory = await loadHistoryFromDB();
                    orderHistory = newHistory;
                    
                    alert('Заказ сохранён в базе данных');
                }
            });

            // ============================================
            // ОЧИСТКА ЗАКАЗА
            // ============================================
            clearBtn.addEventListener('click', () => {
                if (!currentTableId) return;
                
                if (confirm('Очистить заказ?')) {
                    delete orders[currentTableId];
                    renderOrder();
                }
            });

            // ============================================
            // ПЕРЕКЛЮЧЕНИЕ ТАБОВ
            // ============================================
            tabCurrent.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tabCurrent.classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                currentSection.classList.add('active');
            });

            tabHistory.addEventListener('click', async () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tabHistory.classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                historySection.classList.add('active');
                
                // Загружаем свежую историю из БД
                historyContainer.innerHTML = '<div class="loading">Загрузка...</div>';
                orderHistory = await loadHistoryFromDB();
                renderHistory();
            });

            // ============================================
            // ИНИЦИАЛИЗАЦИЯ
            // ============================================
            async function init() {
                // Загружаем историю
                orderHistory = await loadHistoryFromDB();
                
                // Выбираем первый стол по умолчанию
                if (TABLES.length > 0) {
                    currentTableId = TABLES[0].id;
                }
                
                renderTables();
                renderProducts();
                renderOrder();
            }

            init();
        })();
    </script>
</body>
</html>
