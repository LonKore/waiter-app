<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WAITER PRO • Умный официант</title>
    <!-- Подключаем Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px;
            padding: 24px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header с шестеренкой */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding: 0 8px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .settings-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.97);
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: white;
            stroke-width: 2;
        }

        /* Табы */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
        }

        /* Секции */
        .section {
            display: none;
            animation: fadeIn 0.3s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Сетка столов */
        .section-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .edit-tables-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 12px;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }

        .edit-tables-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .table-btn {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            box-shadow: 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px;
            word-break: break-word;
        }

        .table-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
        }

        .table-btn:active {
            transform: scale(0.95);
        }

        /* Меню товаров */
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .add-product-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
        }

        .add-product-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .product-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 18px 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .product-btn:active {
            background: rgba(59, 130, 246, 0.3);
            transform: scale(0.97);
        }

        .product-name {
            font-size: 14px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            pointer-events: none;
        }

        .delete-product {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 24px;
            height: 24px;
            background: #ef4444;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .delete-product:active {
            background: #dc2626;
            transform: scale(1.1);
        }

        /* Корзина */
        .order-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .order-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .table-indicator {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .order-items {
            min-height: 60px;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-row:last-child {
            border-bottom: none;
        }

        .item-name {
            color: white;
            font-weight: 500;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 40px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .qty-btn:active {
            background: #3b82f6;
            transform: scale(0.9);
        }

        .item-qty {
            color: white;
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        .empty-cart {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 30px 0;
            font-style: italic;
        }

        .total-sum {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 40px;
            padding: 16px 24px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .primary-btn, .clear-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .primary-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 10px 20px -10px #10b981;
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .primary-btn:active, .clear-btn:active {
            transform: scale(0.97);
        }

        /* История */
        .history-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .history-item:active {
            background: rgba(59, 130, 246, 0.2);
            transform: scale(0.98);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-table {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-time {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .history-items {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .history-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .history-item-name {
            color: rgba(255, 255, 255, 0.8);
        }

        .history-item-qty {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #fbbf24;
        }

        .history-total {
            text-align: right;
            color: #fbbf24;
            font-weight: 700;
            font-size: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            margin-top: 8px;
        }

        .history-empty {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }

        .loading {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 40px 0;
        }

        .footer-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 24px;
        }

        /* Модальное окно настроек */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 48px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px black;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 28px;
            text-align: center;
        }

        .modal-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .modal-menu-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 18px 24px;
            color: white;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-menu-item:active {
            background: #3b82f6;
            transform: scale(0.98);
        }

        .modal-menu-item svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: white;
            stroke-width: 2;
        }

        .close-modal {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .close-modal:active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Подменю */
        .submodal {
            display: none;
        }

        .submodal.active {
            display: block;
        }

        .submodal-input, .submodal-select {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .submodal-select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
        }

        .submodal-input:focus, .submodal-select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .submodal-buttons {
            display: flex;
            gap: 12px;
        }

        .submodal-save, .submodal-cancel {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .submodal-save {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
        }

        .submodal-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Список столов в настройках */
        .tables-list {
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .table-edit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 12px 16px;
            margin-bottom: 8px;
        }

        .table-edit-item input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 8px 12px;
            color: white;
            font-size: 14px;
        }

        .table-edit-item input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .delete-table-btn {
            background: #ef4444;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
        }

        .delete-table-btn:active {
            background: #dc2626;
            transform: scale(0.9);
        }

        .add-table-form {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .add-table-form input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
        }

        .add-table-form button {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            border-radius: 30px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
        }

        .add-table-form button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header с шестеренкой -->
        <div class="header">
            <h1>WAITER PRO</h1>
            <button class="settings-btn" id="settingsBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"/>
                    <path d="M19.4 15C18.9 16 18.1 16.7 17.3 17.2L19 20.6L16 21L15.2 18.2C14.3 18.5 13.3 18.7 12.3 18.7C11.3 18.7 10.3 18.5 9.4 18.2L8.6 21L5.6 20.6L7.3 17.2C6.5 16.7 5.7 16 5.2 15L2 14.5L3 11.5L2 8.5L5.2 8C5.7 7 6.5 6.3 7.3 5.8L5.6 2.4L8.6 2L9.4 4.8C10.3 4.5 11.3 4.3 12.3 4.3C13.3 4.3 14.3 4.5 15.2 4.8L16 2L19 2.4L17.3 5.8C18.1 6.3 18.9 7 19.4 8L22 8.5L21 11.5L22 14.5L19.4 15Z"/>
                </svg>
                Настройки
            </button>
        </div>

        <!-- Табы -->
        <div class="tabs">
            <button class="tab active" id="tabCurrent">📋 Заказ</button>
            <button class="tab" id="tabHistory">📜 История</button>
        </div>

        <!-- Секция текущего заказа -->
        <div class="section active" id="currentSection">
            <!-- Столы -->
            <div class="tables-section">
                <div class="section-label">
                    СТОЛЫ
                    <button class="edit-tables-btn" id="editTablesBtn">✎ Редактировать</button>
                </div>
                <div class="tables-grid" id="tablesContainer"></div>
            </div>

            <!-- Товары -->
            <div class="menu-section">
                <div class="menu-header">
                    <div class="section-label">МЕНЮ</div>
                    <button class="add-product-btn" id="addProductBtn">
                        <span>+</span> Добавить
                    </button>
                </div>
                <div class="menu-grid" id="productsContainer"></div>
            </div>

            <!-- Заказ -->
            <div class="order-section">
                <div class="order-header">
                    <h3>Текущий заказ</h3>
                    <span class="table-indicator" id="currentTableLabel">Стол не выбран</span>
                </div>
                <div class="order-items" id="orderItemsContainer">
                    <div class="empty-cart">Выберите товар</div>
                </div>
            </div>

            <!-- Итого -->
            <div class="total-sum" id="totalSum">0 ₽</div>

            <!-- Кнопки -->
            <div class="action-buttons">
                <button class="primary-btn" id="confirmOrderBtn">✅ Подтвердить</button>
                <button class="clear-btn" id="clearOrderBtn">🗑️ Очистить</button>
            </div>
        </div>

        <!-- Секция истории -->
        <div class="section" id="historySection">
            <div class="section-label">ИСТОРИЯ ЗАКАЗОВ</div>
            <div class="history-list" id="historyContainer">
                <div class="loading">Загрузка...</div>
            </div>
        </div>

        <div class="footer-note">Нажмите на товар • +/- в заказе</div>
    </div>

    <!-- Модальное окно настроек -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-title">⚙️ Настройки</div>
            
            <!-- Главное меню настроек -->
            <div id="mainSettingsMenu">
                <div class="modal-menu">
                    <div class="modal-menu-item" id="editTablesMenuItem">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 7h3v3h-3v-3zm-5 0h3v3H7v-3zm10 0h3v3h-3v-3z"/>
                        </svg>
                        Управление столами
                    </div>
                    <div class="modal-menu-item" id="setPriceMenuItem">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.5 15h-3v-2h3v2zm0-4h-3V7h3v6z"/>
                        </svg>
                        Назначить цену
                    </div>
                    <div class="modal-menu-item" id="addProductMenuItem">
                        <svg viewBox="0 0 24 24">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 10h-5v5h-2v-5H8v-2h5V6h2v5h5v2z"/>
                        </svg>
                        Добавить позицию
                    </div>
                </div>
                <button class="close-modal" id="closeSettingsBtn">Закрыть</button>
            </div>

            <!-- Подменю: управление столами -->
            <div class="submodal" id="editTablesSubmenu">
                <div class="modal-title">🪑 Управление столами</div>
                <div class="tables-list" id="tablesList"></div>
                <div class="add-table-form">
                    <input type="text" id="newTableNameInput" placeholder="Название стола (например: VIP)">
                    <button id="addTableBtn">+</button>
                </div>
                <div class="submodal-buttons" style="margin-top: 20px;">
                    <button class="submodal-cancel" id="cancelEditTablesBtn">Назад</button>
                </div>
            </div>

            <!-- Подменю: назначить цену -->
            <div class="submodal" id="setPriceSubmenu">
                <div class="modal-title">💰 Назначить цену</div>
                <select class="submodal-select" id="priceProductSelect"></select>
                <input type="number" class="submodal-input" id="newPriceInput" placeholder="Новая цена" value="0">
                <div class="submodal-buttons">
                    <button class="submodal-save" id="savePriceBtn">Сохранить</button>
                    <button class="submodal-cancel" id="cancelPriceBtn">Назад</button>
                </div>
            </div>

            <!-- Подменю: добавить позицию -->
            <div class="submodal" id="addProductSubmenu">
                <div class="modal-title">🍽️ Добавить позицию</div>
                <input type="text" class="submodal-input" id="newProductNameInput" placeholder="Название">
                <input type="number" class="submodal-input" id="newProductPriceInput" placeholder="Цена" value="0">
                <div class="submodal-buttons">
                    <button class="submodal-save" id="saveProductFromSettingsBtn">Добавить</button>
                    <button class="submodal-cancel" id="cancelProductBtn">Назад</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Supabase config
            const SUPABASE_URL = 'https://sbogpobfdlpxjdtbbmln.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_Jd2iPn2HX3IDw-sqxhXhwA_mc1W2pHY';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // Данные
            let tables = []; // теперь это массив объектов { id, name }
            let products = [];
            let orders = {};
            let orderHistory = [];
            let currentTable = null; // теперь хранит id стола

            // DOM элементы
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const closeSettingsBtn = document.getElementById('closeSettingsBtn');
            const mainSettingsMenu = document.getElementById('mainSettingsMenu');
            
            // Подменю
            const setPriceSubmenu = document.getElementById('setPriceSubmenu');
            const addProductSubmenu = document.getElementById('addProductSubmenu');
            const editTablesSubmenu = document.getElementById('editTablesSubmenu');
            
            // === ЗАГРУЗКА СТОЛОВ ИЗ БАЗЫ ===
            async function loadTablesFromDB() {
                try {
                    const { data, error } = await supabase
                        .from('tables')
                        .select('*')
                        .order('name');

                    if (error && error.code === '42P01') {
                        await createTablesTable();
                        return;
                    }

                    if (data && data.length > 0) {
                        tables = data;
                    } else {
                        // Столы по умолчанию
                        const defaultTables = ['1', '2', '3', '4', '5', '6', '7', '8'];
                        for (let name of defaultTables) {
                            await addTableToDB(name);
                        }
                    }
                } catch (e) {
                    console.error('Ошибка загрузки столов:', e);
                }
            }

            async function createTablesTable() {
                try {
                    const { error: sqlError } = await supabase.rpc('create_tables_table', {});
                    if (sqlError) {
                        // Создаем через REST если RPC нет
                        const { error } = await supabase
                            .from('tables')
                            .insert([{ name: '1' }]);
                        if (error) console.error('Ошибка создания таблицы:', error);
                    }
                } catch (e) {
                    console.error('Ошибка создания таблицы tables:', e);
                }
            }

            async function addTableToDB(name) {
                try {
                    const { data, error } = await supabase
                        .from('tables')
                        .insert([{ name }])
                        .select();
                    if (error) throw error;
                    return data[0];
                } catch (e) {
                    console.error('Ошибка добавления стола:', e);
                    return null;
                }
            }

            async function updateTableInDB(id, name) {
                try {
                    const { error } = await supabase
                        .from('tables')
                        .update({ name })
                        .eq('id', id);
                    if (error) throw error;
                } catch (e) {
                    console.error('Ошибка обновления стола:', e);
                }
            }

            async function deleteTableFromDB(id) {
                try {
                    const { error } = await supabase
                        .from('tables')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                    return true;
                } catch (e) {
                    console.error('Ошибка удаления стола:', e);
                    return false;
                }
            }

            // === ТОВАРЫ ===
            async function loadProductsFromDB() {
                try {
                    const { data, error } = await supabase
                        .from('products')
                        .select('*')
                        .order('id');

                    if (error && error.code === '42P01') {
                        await createProductsTable();
                        return;
                    }

                    if (data && data.length > 0) {
                        products = data;
                    } else {
                        await createInitialProducts();
                    }
                } catch (e) {
                    console.error('Ошибка загрузки товаров:', e);
                }
            }

            async function createProductsTable() {
                try {
                    const { error } = await supabase.rpc('create_products_table');
                    if (error) {
                        await createInitialProducts();
                    }
                } catch (e) {
                    console.error('Ошибка создания таблицы products:', e);
                }
            }

            async function createInitialProducts() {
                const initialProducts = [
                    'Мед черника', 'Кран банан', 'Майкл дж', 'Стаут', 'Натти нат',
                    'Брускетта', 'пивчики', 'Чипсы', 'Чичарон', 'Карпачо',
                    'Картофель фри', 'Фисташка', 'Арахис', 'Сендвич', 'Гренки',
                    'Лагер', 'Хелес'
                ];
                
                for (let name of initialProducts) {
                    await addProductToDB(name, 0);
                }
                await loadProductsFromDB();
            }

            async function addProductToDB(name, price) {
                try {
                    const { data, error } = await supabase
                        .from('products')
                        .insert([{ name, price }])
                        .select();
                    
                    if (error) throw error;
                    return data[0];
                } catch (e) {
                    console.error('Ошибка добавления товара:', e);
                    return null;
                }
            }

            async function updateProductInDB(id, updates) {
                try {
                    const { error } = await supabase
                        .from('products')
                        .update(updates)
                        .eq('id', id);
                    
                    if (error) throw error;
                } catch (e) {
                    console.error('Ошибка обновления товара:', e);
                }
            }

            async function deleteProductFromDB(id) {
                try {
                    const { error } = await supabase
                        .from('products')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    return true;
                } catch (e) {
                    console.error('Ошибка удаления товара:', e);
                    return false;
                }
            }

            // === ЗАКАЗЫ ===
            async function loadHistoryFromDB() {
                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    
                    return data.map(item => ({
                        id: item.id,
                        table_id: item.table_id,
                        table_name: tables.find(t => t.id === item.table_id)?.name || `Стол ${item.table_id}`,
                        time: new Date(item.created_at).toLocaleString('ru-RU', {
                            hour: '2-digit',
                            minute: '2-digit',
                            day: '2-digit',
                            month: '2-digit'
                        }),
                        items: item.items,
                        total: item.total,
                        rawDate: new Date(item.created_at)
                    }));
                } catch (e) {
                    console.error('Ошибка загрузки истории:', e);
                    return [];
                }
            }

            async function saveOrderToDB(tableId, items, total) {
                try {
                    const { error } = await supabase
                        .from('orders')
                        .insert([{ table_id: tableId, items, total }]);
                    
                    if (error) throw error;
                    return true;
                } catch (e) {
                    console.error('Ошибка сохранения заказа:', e);
                    return false;
                }
            }

            // === UI ФУНКЦИИ ===
            function openSubmenu(type) {
                mainSettingsMenu.style.display = 'none';
                setPriceSubmenu.classList.remove('active');
                editTablesSubmenu.classList.remove('active');
                addProductSubmenu.classList.remove('active');
                
                if (type === 'price') {
                    setPriceSubmenu.classList.add('active');
                    updatePriceProductSelect();
                } else if (type === 'tables') {
                    editTablesSubmenu.classList.add('active');
                    renderTablesList();
                } else if (type === 'product') {
                    addProductSubmenu.classList.add('active');
                }
            }

            function closeSubmenus() {
                mainSettingsMenu.style.display = 'block';
                setPriceSubmenu.classList.remove('active');
                editTablesSubmenu.classList.remove('active');
                addProductSubmenu.classList.remove('active');
            }

            function updatePriceProductSelect() {
                const select = document.getElementById('priceProductSelect');
                select.innerHTML = '';
                products.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.id;
                    option.textContent = `${p.name} (${p.price}₽)`;
                    select.appendChild(option);
                });
            }

            // Рендер списка столов для редактирования
            function renderTablesList() {
                const container = document.getElementById('tablesList');
                let html = '';
                
                tables.forEach(table => {
                    html += `
                        <div class="table-edit-item" data-table-id="${table.id}">
                            <input type="text" class="table-name-input" value="${table.name}" placeholder="Название стола">
                            <button class="delete-table-btn" onclick="window.deleteTable(${table.id})">×</button>
                        </div>
                    `;
                });
                
                container.innerHTML = html;

                // Добавляем обработчики для input
                document.querySelectorAll('.table-name-input').forEach(input => {
                    input.addEventListener('change', async (e) => {
                        const tableItem = e.target.closest('.table-edit-item');
                        const tableId = parseInt(tableItem.dataset.tableId);
                        const newName = e.target.value.trim();
                        
                        if (newName) {
                            await updateTableInDB(tableId, newName);
                            const table = tables.find(t => t.id === tableId);
                            if (table) table.name = newName;
                            renderTables();
                            
                            // Обновляем отображение текущего стола если нужно
                            if (currentTable === tableId) {
                                document.getElementById('currentTableLabel').textContent = newName;
                            }
                        }
                    });
                });
            }

            // Удаление стола
            window.deleteTable = async function(tableId) {
                if (confirm('Удалить стол?')) {
                    const deleted = await deleteTableFromDB(tableId);
                    if (deleted) {
                        tables = tables.filter(t => t.id !== tableId);
                        if (currentTable === tableId) {
                            currentTable = tables.length > 0 ? tables[0].id : null;
                        }
                        renderTables();
                        renderTablesList();
                    }
                }
            };

            // === ОБРАБОТЧИКИ НАСТРОЕК ===
            document.getElementById('editTablesMenuItem').addEventListener('click', () => openSubmenu('tables'));
            document.getElementById('setPriceMenuItem').addEventListener('click', () => openSubmenu('price'));
            document.getElementById('addProductMenuItem').addEventListener('click', () => openSubmenu('product'));
            
            document.getElementById('cancelPriceBtn').addEventListener('click', closeSubmenus);
            document.getElementById('cancelEditTablesBtn').addEventListener('click', closeSubmenus);
            document.getElementById('cancelProductBtn').addEventListener('click', closeSubmenus);

            document.getElementById('editTablesBtn').addEventListener('click', () => {
                settingsBtn.click();
                setTimeout(() => openSubmenu('tables'), 300);
            });

            settingsBtn.addEventListener('click', () => {
                settingsModal.classList.add('active');
            });

            closeSettingsBtn.addEventListener('click', () => {
                settingsModal.classList.remove('active');
                closeSubmenus();
            });

            // Добавление нового стола
            document.getElementById('addTableBtn').addEventListener('click', async () => {
                const input = document.getElementById('newTableNameInput');
                const name = input.value.trim();
                
                if (name) {
                    const newTable = await addTableToDB(name);
                    if (newTable) {
                        tables.push(newTable);
                        renderTables();
                        renderTablesList();
                        input.value = '';
                    }
                }
            });

            // Сохранение цены
            document.getElementById('savePriceBtn').addEventListener('click', async () => {
                const productId = document.getElementById('priceProductSelect').value;
                const newPrice = parseInt(document.getElementById('newPriceInput').value) || 0;
                
                await updateProductInDB(productId, { price: newPrice });
                
                const product = products.find(p => p.id == productId);
                if (product) product.price = newPrice;
                
                renderProducts();
                renderOrder();
                closeSubmenus();
                document.getElementById('newPriceInput').value = '0';
            });

            // Добавление позиции из настроек
            document.getElementById('saveProductFromSettingsBtn').addEventListener('click', async () => {
                const name = document.getElementById('newProductNameInput').value.trim();
                const price = parseInt(document.getElementById('newProductPriceInput').value) || 0;
                
                if (name) {
                    const newProduct = await addProductToDB(name, price);
                    if (newProduct) {
                        products.push(newProduct);
                        renderProducts();
                        closeSubmenus();
                        document.getElementById('newProductNameInput').value = '';
                        document.getElementById('newProductPriceInput').value = '0';
                    }
                }
            });

            // === РЕНДЕР ===
            function renderTables() {
                let html = '';
                tables.forEach(table => {
                    const activeClass = (currentTable === table.id) ? 'active' : '';
                    html += `<button class="table-btn ${activeClass}" data-table-id="${table.id}">${table.name}</button>`;
                });
                document.getElementById('tablesContainer').innerHTML = html;

                document.querySelectorAll('.table-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const tableId = parseInt(e.currentTarget.dataset.tableId);
                        currentTable = tableId;
                        if (!orders[currentTable]) orders[currentTable] = {};
                        renderAll();
                    });
                });
            }

            function renderProducts() {
                let html = '';
                products.forEach(p => {
                    html += `
                        <button class="product-btn" data-product-id="${p.id}">
                            <span class="product-name">${p.name}</span>
                            <span class="product-price">${p.price}₽</span>
                            <span class="delete-product" data-product-id="${p.id}">×</span>
                        </button>
                    `;
                });
                document.getElementById('productsContainer').innerHTML = html;

                document.querySelectorAll('.product-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const productId = e.currentTarget.dataset.productId;
                        handleAddProduct(productId);
                    });
                });

                document.querySelectorAll('.delete-product').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const productId = e.target.dataset.productId;
                        if (confirm('Удалить товар?')) {
                            const deleted = await deleteProductFromDB(productId);
                            if (deleted) {
                                products = products.filter(p => p.id != productId);
                                renderProducts();
                            }
                        }
                    });
                });
            }

            function handleAddProduct(productId) {
                if (!currentTable) {
                    alert('Выберите стол');
                    return;
                }
                const order = orders[currentTable] || {};
                order[productId] = (order[productId] || 0) + 1;
                orders[currentTable] = order;
                renderOrder();
            }

            function handleIncrease(productId) {
                if (!currentTable) return;
                const order = orders[currentTable] || {};
                order[productId] = (order[productId] || 0) + 1;
                orders[currentTable] = order;
                renderOrder();
            }

            function handleDecrease(productId) {
                if (!currentTable) return;
                const order = orders[currentTable] || {};
                if (order[productId] > 1) {
                    order[productId] -= 1;
                } else {
                    delete order[productId];
                }
                orders[currentTable] = order;
                renderOrder();
            }

            function renderOrder() {
                const currentTableObj = tables.find(t => t.id === currentTable);
                const label = document.getElementById('currentTableLabel');
                label.textContent = currentTableObj ? currentTableObj.name : 'Стол не выбран';

                const order = currentTable ? (orders[currentTable] || {}) : {};
                
                if (!currentTable || Object.keys(order).length === 0) {
                    document.getElementById('orderItemsContainer').innerHTML = 
                        '<div class="empty-cart">Выберите товар</div>';
                    document.getElementById('totalSum').textContent = '0 ₽';
                    return;
                }

                let html = '';
                let total = 0;
                
                for (let productId in order) {
                    const count = order[productId];
                    const product = products.find(p => p.id == productId);
                    if (!product) continue;
                    
                    total += product.price * count;
                    
                    html += `
                        <div class="order-row">
                            <span class="item-name">${product.name}</span>
                            <div class="item-controls">
                                <button class="qty-btn minus" data-product-id="${product.id}">−</button>
                                <span class="item-qty">${count}</span>
                                <button class="qty-btn plus" data-product-id="${product.id}">+</button>
                            </div>
                        </div>
                    `;
                }

                document.getElementById('orderItemsContainer').innerHTML = html;
                document.getElementById('totalSum').textContent = `${total} ₽`;

                document.querySelectorAll('.qty-btn.plus').forEach(btn => {
                    btn.addEventListener('click', () => handleIncrease(btn.dataset.productId));
                });

                document.querySelectorAll('.qty-btn.minus').forEach(btn => {
                    btn.addEventListener('click', () => handleDecrease(btn.dataset.productId));
                });
            }

            function renderAll() {
                renderTables();
                renderProducts();
                renderOrder();
            }

            // === ИСТОРИЯ ===
            async function loadAndRenderHistory() {
                const container = document.getElementById('historyContainer');
                container.innerHTML = '<div class="loading">Загрузка...</div>';
                
                const history = await loadHistoryFromDB();
                orderHistory = history;
                
                if (history.length === 0) {
                    container.innerHTML = '<div class="history-empty">История пуста</div>';
                    return;
                }

                let html = '';
                
                // Группируем по датам
                const groupedByDate = {};
                history.forEach(item => {
                    const dateStr = item.rawDate.toLocaleDateString('ru-RU', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric'
                    });
                    
                    if (!groupedByDate[dateStr]) {
                        groupedByDate[dateStr] = [];
                    }
                    groupedByDate[dateStr].push(item);
                });

                const sortedDates = Object.keys(groupedByDate).sort((a, b) => {
                    const [d1, m1, y1] = a.split('.').map(Number);
                    const [d2, m2, y2] = b.split('.').map(Number);
                    return new Date(y2, m2-1, d2) - new Date(y1, m1-1, d1);
                });

                for (let date of sortedDates) {
                    const dayItems = groupedByDate[date];
                    dayItems.sort((a, b) => b.rawDate - a.rawDate);
                    
                    for (let item of dayItems) {
                        let itemsList = [];
                        for (let productId in item.items) {
                            const count = item.items[productId];
                            const product = products.find(p => p.id == productId);
                            if (product) {
                                itemsList.push(`${product.name} x${count}`);
                            }
                        }
                        
                        html += `
                            <div class="history-item" data-order-id="${item.id}">
                                <div class="history-header">
                                    <span class="history-table">${item.table_name}</span>
                                    <span class="history-time">${item.time}</span>
                                </div>
                                <div class="history-items">
                                    ${itemsList.map(text => `<div class="history-item-row">
                                        <span class="history-item-name">${text.split(' x')[0]}</span>
                                        <span class="history-item-qty">×${text.split('x')[1]}</span>
                                    </div>`).join('')}
                                </div>
                                <div class="history-total">${item.total} ₽</div>
                            </div>
                        `;
                    }
                }

                container.innerHTML = html;

                document.querySelectorAll('.history-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const orderId = item.dataset.orderId;
                        const order = orderHistory.find(o => o.id == orderId);
                        if (order) {
                            showOrderDetails(order);
                        }
                    });
                });
            }

            function showOrderDetails(order) {
                const modal = document.createElement('div');
                modal.className = 'modal active';
                
                let itemsHtml = '';
                let total = 0;
                
                for (let productId in order.items) {
                    const count = order.items[productId];
                    const product = products.find(p => p.id == productId);
                    if (product) {
                        const itemTotal = product.price * count;
                        total += itemTotal;
                        itemsHtml += `
                            <div class="order-row">
                                <span class="item-name">${product.name}</span>
                                <div style="display: flex; gap: 12px; align-items: center;">
                                    <span class="item-qty" style="background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 30px;">×${count}</span>
                                    <span style="color: #fbbf24; font-weight: 600;">${itemTotal} ₽</span>
                                </div>
                            </div>
                        `;
                    }
                }

                modal.innerHTML = `
                    <div class="modal-content" style="max-width: 400px;">
                        <div class="modal-title">${order.table_name}</div>
                        <div style="color: rgba(255,255,255,0.5); margin-bottom: 20px; text-align: center;">${order.time}</div>
                        <div class="order-items" style="margin-bottom: 20px;">
                            ${itemsHtml}
                        </div>
                        <div class="total-sum" style="margin-bottom: 20px;">${total} ₽</div>
                        <button class="close-modal" onclick="this.closest('.modal').remove()">Закрыть</button>
                    </div>
                `;

                document.body.appendChild(modal);
            }

            // === ТАБЫ ===
            document.getElementById('tabCurrent').addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.getElementById('tabCurrent').classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById('currentSection').classList.add('active');
            });

            document.getElementById('tabHistory').addEventListener('click', async () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.getElementById('tabHistory').classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById('historySection').classList.add('active');
                await loadAndRenderHistory();
            });

            // === КНОПКИ ЗАКАЗА ===
            document.getElementById('confirmOrderBtn').addEventListener('click', async () => {
                if (!currentTable) {
                    alert('Выберите стол');
                    return;
                }
                
                const order = orders[currentTable] || {};
                if (Object.keys(order).length === 0) {
                    alert('Заказ пуст');
                    return;
                }

                const total = Object.entries(order).reduce((sum, [id, qty]) => {
                    const product = products.find(p => p.id == id);
                    return sum + (product?.price || 0) * qty;
                }, 0);

                const saved = await saveOrderToDB(currentTable, order, total);
                
                if (saved) {
                    orders[currentTable] = {};
                    renderOrder();
                    alert('Заказ сохранён');
                }
            });

            document.getElementById('clearOrderBtn').addEventListener('click', () => {
                if (!currentTable) return;
                if (confirm('Очистить заказ?')) {
                    orders[currentTable] = {};
                    renderOrder();
                }
            });

            document.getElementById('addProductBtn').addEventListener('click', () => {
                settingsBtn.click();
                setTimeout(() => openSubmenu('product'), 300);
            });

            // === ИНИЦИАЛИЗАЦИЯ ===
            async function init() {
                await loadTablesFromDB();
                await loadProductsFromDB();
                if (tables.length > 0) {
                    currentTable = tables[0].id;
                    if (!orders[currentTable]) orders[currentTable] = {};
                }
                renderAll();
            }

            init();

            // Закрытие модалки по клику вне
            settingsModal.addEventListener('click', (e) => {
                if (e.target === settingsModal) {
                    settingsModal.classList.remove('active');
                    closeSubmenus();
                }
            });
        })();
    </script>
</body>
</html>
