<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WAITER PRO • Умный официант</title>
    <!-- Подключаем Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px;
            padding: 24px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding: 0 8px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .settings-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.97);
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: white;
            stroke-width: 2;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
        }

        .section {
            display: none;
            animation: fadeIn 0.3s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .online-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #10b981;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box svg {
            width: 20px;
            height: 20px;
            stroke: rgba(255, 255, 255, 0.5);
            fill: none;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border-color: transparent;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .table-btn {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            box-shadow: 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px;
            word-break: break-word;
        }

        .table-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
        }

        .table-btn:active {
            transform: scale(0.95);
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .add-product-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
        }

        .add-product-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .category-tab {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .category-tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border-color: transparent;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .product-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 18px 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .product-btn:active {
            background: rgba(59, 130, 246, 0.3);
            transform: scale(0.97);
        }

        .product-name {
            font-size: 14px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            pointer-events: none;
        }

        .product-category {
            position: absolute;
            top: -6px;
            left: -6px;
            background: #3b82f6;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .delete-product {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 24px;
            height: 24px;
            background: #ef4444;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .delete-product:active {
            background: #dc2626;
            transform: scale(1.1);
        }

        .order-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .order-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .table-indicator {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .order-items {
            min-height: 60px;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-row:last-child {
            border-bottom: none;
        }

        .item-name {
            color: white;
            font-weight: 500;
            flex: 2;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 40px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .qty-btn:active {
            background: #3b82f6;
            transform: scale(0.9);
        }

        .item-qty {
            color: white;
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        .empty-cart {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 30px 0;
            font-style: italic;
        }

        .total-sum {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 40px;
            padding: 16px 24px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.5);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .primary-btn, .clear-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .primary-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 10px 20px -10px #10b981;
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .primary-btn:active, .clear-btn:active {
            transform: scale(0.97);
        }

        .history-header-actions {
            display: flex;
            gap: 8px;
        }

        .pin-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 8px 16px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .pin-btn.active {
            background: #fbbf24;
            color: #0f172a;
            border-color: #f59e0b;
        }

        .pin-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .history-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .history-item.pinned {
            background: rgba(251, 191, 36, 0.1);
            border-color: #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }

        .history-item.pinned::before {
            content: '📌';
            position: absolute;
            top: -8px;
            left: -8px;
            font-size: 16px;
            background: #fbbf24;
            color: #0f172a;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-table {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-time {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .history-items {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .history-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .history-item-name {
            color: rgba(255, 255, 255, 0.8);
        }

        .history-item-qty {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #fbbf24;
        }

        .history-total {
            text-align: right;
            color: #fbbf24;
            font-weight: 700;
            font-size: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 12px;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-actions {
            display: flex;
            gap: 8px;
        }

        .history-action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .history-action-btn.pin {
            background: #fbbf24;
            color: #0f172a;
        }

        .history-action-btn.edit {
            background: #3b82f6;
            color: white;
        }

        .history-action-btn.delete {
            background: #ef4444;
            color: white;
        }

        .history-action-btn:active {
            transform: scale(0.9);
        }

        .history-empty {
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }

        .loading {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 40px 0;
        }

        .footer-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 24px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 48px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px black;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 28px;
            text-align: center;
        }

        .modal-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .modal-menu-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 18px 24px;
            color: white;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-menu-item:active {
            background: #3b82f6;
            transform: scale(0.98);
        }

        .modal-menu-item svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: white;
            stroke-width: 2;
        }

        .close-modal {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .close-modal:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .submodal {
            display: none;
        }

        .submodal.active {
            display: block;
        }

        .submodal-input, .submodal-select {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .submodal-select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
        }

        .submodal-input:focus, .submodal-select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .submodal-buttons {
            display: flex;
            gap: 12px;
        }

        .submodal-save, .submodal-cancel {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .submodal-save {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
        }

        .submodal-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tables-list {
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .table-edit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 12px 16px;
            margin-bottom: 8px;
        }

        .table-edit-item input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 8px 12px;
            color: white;
            font-size: 14px;
        }

        .table-edit-item input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .delete-table-btn {
            background: #ef4444;

                }
            }

            async function loadProductsFromDB() {
                try {
                    const { data, error } = await supabase
                        .from('products')
                        .select('*')
                        .order('id');

                    if (error || !data || data.length === 0) {
                        products = [...INITIAL_PRODUCTS];
                        for (let product of products) {
                            await supabase.from('products').insert([{ 
                                id: product.id, 
                                name: product.name, 
                                price: product.price,
                                category: product.category 
                            }]);
                        }
                    } else {
                        products = data;
                    }
                } catch (e) {
                    console.error('Ошибка загрузки товаров:', e);
                    products = [...INITIAL_PRODUCTS];
                }
            }

            async function loadHistoryFromDB() {
                try {
                    const { data, error } = await supabase
                        .from('orders')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) {
                        console.error('Ошибка загрузки истории:', error);
                        return [];
                    }

                    return data.map(item => ({
                        id: item.id,
                        tableId: item.table_id,
                        tableName: tables.find(t => t.id === item.table_id)?.name || `Стол ${item.table_id}`,
                        time: new Date(item.created_at).toLocaleString('ru-RU', {
                            hour: '2-digit',
                            minute: '2-digit',
                            day: '2-digit',
                            month: '2-digit'
                        }),
                        rawDate: new Date(item.created_at),
                        items: item.items,
                        total: item.total
                    }));
                } catch (e) {
                    console.error('Ошибка:', e);
                    return [];
                }
            }

            async function saveOrderToDB(tableId, items, total) {
                try {
                    const { error } = await supabase
                        .from('orders')
                        .insert([{ 
                            table_id: tableId, 
                            items: items, 
                            total: total 
                        }]);

                    if (error) {
                        console.error('Ошибка сохранения:', error);
                        showToast('❌ Ошибка сохранения заказа', 'error');
                        return false;
                    }
                    
                    showToast('✅ Заказ сохранён', 'success');
                    return true;
                } catch (e) {
                    console.error('Ошибка:', e);
                    showToast('❌ Ошибка соединения', 'error');
                    return false;
                }
            }

            async function updateProductInDB(id, updates) {
                try {
                    const { error } = await supabase
                        .from('products')
                        .update(updates)
                        .eq('id', id);
                    if (error) throw error;
                    showToast('💰 Цена обновлена', 'success');
                } catch (e) {
                    console.error('Ошибка обновления товара:', e);
                    showToast('❌ Ошибка обновления', 'error');
                }
            }

            async function updateTableInDB(id, name) {
                try {
                    const { error } = await supabase
                        .from('tables')
                        .update({ name })
                        .eq('id', id);
                    if (error) throw error;
                } catch (e) {
                    console.error('Ошибка обновления стола:', e);
                }
            }

            async function addTableToDB(name) {
                try {
                    const newId = tables.length > 0 ? Math.max(...tables.map(t => t.id)) + 1 : 1;
                    const { error } = await supabase
                        .from('tables')
                        .insert([{ id: newId, name }]);
                    if (error) throw error;
                    tables.push({ id: newId, name });
                } catch (e) {
                    console.error('Ошибка добавления стола:', e);
                }
            }

            async function deleteTableFromDB(id) {
                try {
                    const { error } = await supabase
                        .from('tables')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                } catch (e) {
                    console.error('Ошибка удаления стола:', e);
                }
            }

            async function deleteOrderFromDB(id) {
                try {
                    const { error } = await supabase
                        .from('orders')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                    showToast('🗑️ Заказ удалён', 'success');
                    return true;
                } catch (e) {
                    console.error('Ошибка удаления заказа:', e);
                    showToast('❌ Ошибка удаления', 'error');
                    return false;
                }
            }

            // ============================================
            // UI ФУНКЦИИ
            // ============================================
            function renderTables() {
                let html = '';
                tables.forEach(table => {
                    const activeClass = (currentTableId === table.id) ? 'active' : '';
                    html += `<button class="table-btn ${activeClass}" data-table-id="${table.id}">${table.name}</button>`;
                });
                tablesContainer.innerHTML = html;

                document.querySelectorAll('.table-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const tableId = parseInt(e.currentTarget.dataset.tableId);
                        currentTableId = tableId;
                        renderTables();
                        renderOrder();
                    });
                });
            }

            function renderProducts() {
                let filtered = [...products];
                
                // Фильтр по категории
                if (selectedCategory !== 'all') {
                    filtered = filtered.filter(p => p.category === selectedCategory);
                }
                
                // Фильтр по поиску
                if (menuSearchQuery) {
                    const query = menuSearchQuery.toLowerCase();
                    filtered = filtered.filter(p => p.name.toLowerCase().includes(query));
                }
                
                let html = '';
                filtered.forEach(p => {
                    html += `
                        <button class="product-btn" data-product-id="${p.id}">
                            ${p.category ? `<span class="product-category">${p.category === 'Пиво' ? '🍺' : p.category === 'Еда' ? '🍗' : '🧃'}</span>` : ''}
                            <span class="product-name">${p.name}</span>
                            <span class="product-price">${p.price}₽</span>
                        </button>
                    `;
                });
                
                if (filtered.length === 0) {
                    productsContainer.innerHTML = '<div class="empty-cart">Товары не найдены</div>';
                } else {
                    productsContainer.innerHTML = html;
                }

                document.querySelectorAll('.product-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const productId = parseInt(e.currentTarget.dataset.productId);
                        handleAddProduct(productId);
                    });
                });
            }

            function handleAddProduct(productId) {
                if (!currentTableId) {
                    showToast('❌ Выберите стол', 'error');
                    return;
                }

                if (!orders[currentTableId]) {
                    orders[currentTableId] = {};
                }

                orders[currentTableId][productId] = (orders[currentTableId][productId] || 0) + 1;
                renderOrder();
            }

            function handleIncrease(productId) {
                if (!currentTableId) return;
                orders[currentTableId][productId] = (orders[currentTableId][productId] || 0) + 1;
                renderOrder();
            }

            function handleDecrease(productId) {
                if (!currentTableId) return;
                
                if (orders[currentTableId][productId] > 1) {
                    orders[currentTableId][productId] -= 1;
                } else {
                    delete orders[currentTableId][productId];
                }
                
                renderOrder();
            }

            function renderOrder() {
                const currentTable = tables.find(t => t.id === currentTableId);
                currentTableLabel.textContent = currentTable ? currentTable.name : 'Стол не выбран';

                const order = (currentTableId && orders[currentTableId]) ? orders[currentTableId] : {};
                
                if (!currentTableId || Object.keys(order).length === 0) {
                    orderItemsContainer.innerHTML = '<div class="empty-cart">Выберите товар</div>';
                    totalSumElement.textContent = '0 ₽';
                    return;
                }

                let html = '';
                let total = 0;
                
                for (let productId in order) {
                    const count = order[productId];
                    const product = products.find(p => p.id === parseInt(productId));
                    if (!product) continue;
                    
                    total += product.price * count;
                    
                    html += `
                        <div class="order-row">
                            <span class="item-name">${product.name}</span>
                            <div class="item-controls">
                                <button class="qty-btn minus" data-product-id="${product.id}">−</button>
                                <span class="item-qty">${count}</span>
                                <button class="qty-btn plus" data-product-id="${product.id}">+</button>
                            </div>
                        </div>
                    `;
                }

                orderItemsContainer.innerHTML = html;
                totalSumElement.textContent = `${total} ₽`;

                document.querySelectorAll('.qty-btn.plus').forEach(btn => {
                    btn.addEventListener('click', () => handleIncrease(parseInt(btn.dataset.productId)));
                });

                document.querySelectorAll('.qty-btn.minus').forEach(btn => {
                    btn.addEventListener('click', () => handleDecrease(parseInt(btn.dataset.productId)));
                });
            }

            function filterHistory() {
                let filtered = [...orderHistory];
                
                // Фильтр по поиску
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    filtered = filtered.filter(order => {
                        const items = Object.entries(order.items)
                            .map(([id, qty]) => {
                                const product = products.find(p => p.id === parseInt(id));
                                return product ? product.name : '';
                            })
                            .join(' ')
                            .toLowerCase();
                        return order.tableName.toLowerCase().includes(query) || items.includes(query);
                    });
                }
                
                // Фильтр по категориям
                if (currentFilter === 'pinned') {
                    filtered = filtered.filter(order => pinnedOrders.includes(order.id));
                } else if (currentFilter === 'today') {
                    const today = new Date().toDateString();
                    filtered = filtered.filter(order => order.rawDate?.toDateString() === today);
                }
                
                // Закрепленные всегда сверху
                filtered.sort((a, b) => {
                    const aPinned = pinnedOrders.includes(a.id);
                    const bPinned = pinnedOrders.includes(b.id);
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    return b.rawDate - a.rawDate;
                });
                
                return filtered;
            }

            function togglePin(orderId) {
                const index = pinnedOrders.indexOf(orderId);
                if (index === -1) {
                    pinnedOrders.push(orderId);
                    showToast('📌 Заказ закреплён', 'success');
                } else {
                    pinnedOrders.splice(index, 1);
                    showToast('📌 Закрепление снято', 'info');
                }
                localStorage.setItem('pinned_orders', JSON.stringify(pinnedOrders));
                renderHistory();
            }

            function renderHistory() {
                const filtered = filterHistory();
                
                if (filtered.length === 0) {
                    historyContainer.innerHTML = '<div class="history-empty">Заказы не найдены</div>';
                    return;
                }

                let html = '';
                
                filtered.forEach(order => {
                    let itemsList = [];
                    let orderTotal = 0;
                    
                    for (let productId in order.items) {
                        const count = order.items[productId];
                        const product = products.find(p => p.id === parseInt(productId));
                        if (product) {
                            itemsList.push(`${product.name} x${count}`);
                            orderTotal += product.price * count;
                        }
                    }
                    
                    const isPinned = pinnedOrders.includes(order.id);
                    
                    html += `
                        <div class="history-item ${isPinned ? 'pinned' : ''}">
                            <div class="history-header">
                                <span class="history-table">${order.tableName}</span>
                                <span class="history-time">${order.time}</span>
                            </div>
                            <div class="history-items">
                                ${itemsList.map(text => {
                                    const [name, qty] = text.split(' x');
                                    return `<div class="history-item-row">
                                        <span class="history-item-name">${name}</span>
                                        <span class="history-item-qty">×${qty}</span>
                                    </div>`;
                                }).join('')}
                            </div>
                            <div class="history-total">
                                <span>Итого: ${order.total || orderTotal} ₽</span>
                                <div class="history-actions">
                                    <button class="history-action-btn ${isPinned ? 'pin' : ''}" onclick="togglePin(${order.id})">
                                        📌
                                    </button>
                                    <button class="history-action-btn delete" onclick="deleteOrder(${order.id})">
                                        ×
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                historyContainer.innerHTML = html;
            }

            // Глобальные функции
            window.togglePin = togglePin;
            
            window.deleteOrder = async function(orderId) {
                if (confirm('Удалить заказ из истории?')) {
                    const deleted = await deleteOrderFromDB(orderId);
                    if (deleted) {
                        const index = pinnedOrders.indexOf(orderId);
                        if (index !== -1) {
                            pinnedOrders.splice(index, 1);
                            localStorage.setItem('pinned_orders', JSON.stringify(pinnedOrders));
                        }
                        orderHistory = orderHistory.filter(o => o.id !== orderId);
                        renderHistory();
                    }
                }
            };

            // ============================================
            // ОБРАБОТЧИКИ
            // ============================================
            confirmBtn.addEventListener('click', async () => {
                if (!currentTableId) {
                    showToast('❌ Выберите стол', 'error');
                    return;
                }

                const order = orders[currentTableId];
                if (!order || Object.keys(order).length === 0) {
                    showToast('❌ Заказ пуст', 'error');
                    return;
                }

                const total = parseInt(totalSumElement.textContent.replace('₽', '').trim()) || 0;

                const saved = await saveOrderToDB(currentTableId, order, total);
                
                if (saved) {
                    delete orders[currentTableId];
                    renderOrder();
                    orderHistory = await loadHistoryFromDB();
                }
            });

            clearBtn.addEventListener('click', () => {
                if (!currentTableId) return;
                
                if (confirm('Очистить заказ?')) {
                    delete orders[currentTableId];
                    renderOrder();
                    showToast('🗑️ Заказ очищен', 'info');
                }
            });

            // Переключение табов
            tabCurrent.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tabCurrent.classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                currentSection.classList.add('active');
            });

            tabHistory.addEventListener('click', async () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tabHistory.classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                historySection.classList.add('active');
                
                historyContainer.innerHTML = '<div class="loading">Загрузка...</div>';
                orderHistory = await loadHistoryFromDB();
                renderHistory();
            });

            // Поиск по истории
            historySearch.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderHistory();
            });

            // Поиск по меню
            menuSearch.addEventListener('input', (e) => {
                menuSearchQuery = e.target.value;
                renderProducts();
            });

            // Категории меню
            categoryTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    categoryTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    selectedCategory = tab.dataset.category;
                    renderProducts();
                });
            });

            // Фильтры истории
            filterTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    filterTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFilter = tab.dataset.filter;
                    renderHistory();
                });
            });

            // ============================================
            // НАСТРОЙКИ
            // ============================================
            settingsBtn.addEventListener('click', () => {
                settingsModal.classList.add('active');
            });

            closeSettingsBtn.addEventListener('click', () => {
                settingsModal.classList.remove('active');
                mainSettingsMenu.style.display = 'block';
                editTablesSubmenu.style.display = 'none';
                setPriceSubmenu.style.display = 'none';
            });

            document.getElementById('editTablesMenuItem').addEventListener('click', () => {
                mainSettingsMenu.style.display = 'none';
                editTablesSubmenu.style.display = 'block';
                renderTablesList();
            });

            document.getElementById('setPriceMenuItem').addEventListener('click', () => {
                mainSettingsMenu.style.display = 'none';
                setPriceSubmenu.style.display = 'block';
                updatePriceProductSelect();
            });

            document.getElementById('cancelEditTablesBtn').addEventListener('click', () => {
                editTablesSubmenu.style.display = 'none';
                mainSettingsMenu.style.display = 'block';
            });

            document.getElementById('cancelPriceBtn').addEventListener('click', () => {
                setPriceSubmenu.style.display = 'none';
                mainSettingsMenu.style.display = 'block';
            });

            document.getElementById('editTablesBtn').addEventListener('click', () => {
                settingsBtn.click();
                setTimeout(() => {
                    mainSettingsMenu.style.display = 'none';
                    editTablesSubmenu.style.display = 'block';
                    renderTablesList();
                }, 300);
            });

            function renderTablesList() {
                const container = document.getElementById('tablesList');
                let html = '';
                
                tables.forEach(table => {
                    html += `
                        <div class="table-edit-item" data-table-id="${table.id}">
                            <input type="text" class="table-name-input" value="${table.name}" placeholder="Название стола">
                            <button class="delete-table-btn" onclick="window.deleteTable('${table.id}')">×</button>
                        </div>
                    `;
                });
                
                container.innerHTML = html;

                document.querySelectorAll('.table-name-input').forEach(input => {
                    input.addEventListener('change', async (e) => {
                        const tableItem = e.target.closest('.table-edit-item');
                        const tableId = parseInt(tableItem.dataset.tableId);
                        const newName = e.target.value.trim();
                        
                        if (newName) {
                            await updateTableInDB(tableId, newName);
                            const table = tables.find(t => t.id === tableId);
                            if (table) {
                                table.name = newName;
                                renderTables();
                            }
                        }
                    });
                });
            }

            window.deleteTable = async function(tableId) {
                if (confirm('Удалить стол?')) {
                    await deleteTableFromDB(tableId);
                    tables = tables.filter(t => t.id !== tableId);
                    if (currentTableId === tableId) {
                        currentTableId = tables.length > 0 ? tables[0].id : null;
                    }
                    renderTables();
                    renderTablesList();
                }
            };

            document.getElementById('addTableBtn').addEventListener('click', async () => {
                const input = document.getElementById('newTableNameInput');
                const name = input.value.trim();
                
                if (name) {
                    await addTableToDB(name);
                    renderTables();
                    renderTablesList();
                    input.value = '';
                }
            });

            function updatePriceProductSelect() {
                const select = document.getElementById('priceProductSelect');
                select.innerHTML = '';
                products.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.id;
                    option.textContent = `${p.name} (${p.price}₽)`;
                    select.appendChild(option);
                });
            }

            document.getElementById('savePriceBtn').addEventListener('click', async () => {
                const productId = parseInt(document.getElementById('priceProductSelect').value);
                const newPrice = parseInt(document.getElementById('newPriceInput').value) || 0;
                
                await updateProductInDB(productId, { price: newPrice });
                
                const product = products.find(p => p.id === productId);
                if (product) {
                    product.price = newPrice;
                    renderProducts();
                    renderOrder();
                    
                    document.getElementById('newPriceInput').value = '0';
                    setPriceSubmenu.style.display = 'none';
                    mainSettingsMenu.style.display = 'block';
                }
            });

            document.getElementById('addProductBtn').addEventListener('click', () => {
                const name = prompt('Введите название товара:');
                if (name) {
                    const category = prompt('Введите категорию (Пиво/Еда/Напитки):', 'Пиво');
                    const price = parseInt(prompt('Введите цену:', '0')) || 0;
                    const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 84;
                    products.push({ id: newId, name, price, category });
                    renderProducts();
                }
            });

            // ============================================
            // ИНИЦИАЛИЗАЦИЯ
            // ============================================
            async function init() {
                await loadTablesFromDB();
                await loadProductsFromDB();
                orderHistory = await loadHistoryFromDB();
                
                if (tables.length > 0 && !currentTableId) {
                    currentTableId = tables[0].id;
                }
                
                renderAll();
                setupRealtimeSubscriptions();
            }

            function renderAll() {
                renderTables();
                renderProducts();
                renderOrder();
            }

            init();

            settingsModal.addEventListener('click', (e) => {
                if (e.target === settingsModal) {
                    settingsModal.classList.remove('active');
                    mainSettingsMenu.style.display = 'block';
                    editTablesSubmenu.style.display = 'none';
                    setPriceSubmenu.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
